services:
  # ==========================================================================
  # Go API Server
  # ==========================================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://tierraai:tierraai@postgres:5432/tierraai?sslmode=disable
      - GEE_SERVICE_URL=http://gee:8001
      - GRID_PATH=/app/data/grid.bin
      - CACHE_DIR=/app/cache
    depends_on:
      postgres:
        condition: service_healthy
      gee:
        condition: service_started
    volumes:
      - ./data:/app/data:ro
      - ./cache:/app/cache
    restart: unless-stopped

  # ==========================================================================
  # Python GEE Service (biophysical data for point inspection)
  # ==========================================================================
  gee:
    build:
      context: ./python
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - GEE_PROJECT=${GEE_PROJECT:-tierra-ai}
    volumes:
      - ~/.config/earthengine:/root/.config/earthengine:ro
    restart: unless-stopped

  # ==========================================================================
  # PostgreSQL Database
  # ==========================================================================
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: tierraai
      POSTGRES_PASSWORD: tierraai
      POSTGRES_DB: tierraai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tierraai"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==========================================================================
  # Frontend (Vite dev server)
  # ==========================================================================
  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8080

volumes:
  postgres_data:
  frontend_node_modules:

