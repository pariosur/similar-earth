<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Similar Earth - Discover Similar Places on Earth</title>
    <meta name="description" content="Where else on Earth looks like this? Search the entire planet by satellite similarity." />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/apple-touch-icon.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://similar.earth" />
    <meta property="og:title" content="Similar Earth" />
    <meta property="og:description" content="Where else on Earth looks like this? Search the entire planet by satellite similarity." />
    <meta property="og:image" content="https://similar.earth/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Similar Earth" />
    <meta name="twitter:description" content="Where else on Earth looks like this? Search the entire planet by satellite similarity." />
    <meta name="twitter:image" content="https://similar.earth/og-image.png" />

    <!-- Theme color -->
    <meta name="theme-color" content="#002542" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <!-- MapLibre CSS -->
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />

    <!-- Analytics (Plausible, self-hosted, no cookies) -->
    <script defer data-domain="similar.earth" src="/js/script.js"></script>

    <!-- Prevent flash of wrong theme -->
    <script>
      (function() {
        var t = localStorage.getItem('theme');
        var dark = t === 'dark' || (!t && true) || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.classList.add('dark');
      })();
    </script>
  </head>
  <body class="bg-surface-primary text-surface-text" style="font-family: 'Plus Jakarta Sans', sans-serif">
    <div id="root" style="opacity: 0; transition: opacity 0.3s ease-in"></div>
    <script>
      // Fade in after data has loaded (avoids flash of empty state)
      window.__showApp = function() { document.getElementById('root').style.opacity = '1'; }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
